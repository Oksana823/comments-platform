server:
  port: 8081

spring:
  application:
    name: hmdp

  # ====================== 数据库配置 ======================
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 666666

  # ====================== Redis 配置（关键部分） ======================
  data:
    redis:
      host: localhost
      port: 6379
      password: 666666          # ← 必须有这一行
      database: 0

      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s

  # ====================== Jackson 配置 ======================
  jackson:
    default-property-inclusion: non_null

  # ====================== MVC 配置 ======================
  mvc:
    hiddenmethod:
      filter:
        enabled: true

# ====================== MyBatis-Plus 配置 ======================
mybatis-plus:
  type-aliases-package: com.hmdp.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.hmdp: debug